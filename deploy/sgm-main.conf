server {
    server_name suxrobgm.net www.suxrobgm.net; # managed by Certbot

    location / {
        proxy_pass http://127.0.0.1:8000;
		proxy_http_version 1.1;
		proxy_set_header   Upgrade $http_upgrade;
		proxy_set_header   Connection $connection_upgrade;
		proxy_set_header   Host $host;
		proxy_cache_bypass $http_upgrade;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/suxrobgm.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/suxrobgm.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.suxrobgm.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = suxrobgm.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


	listen 80 ;
	listen [::]:80 ;
    server_name suxrobgm.net www.suxrobgm.net;
    return 404; # managed by Certbot
}