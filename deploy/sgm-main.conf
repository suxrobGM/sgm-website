# SGM Main Nginx Configuration

# Setup:
#   1. Copy this file: sudo cp nginx.conf /etc/nginx/sites-available/sgm-main.conf
#   2. Symlink: sudo ln -s /etc/nginx/sites-available/sgm-main.conf /etc/nginx/sites-enabled/
#   3. Test config: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
#
# SSL with Certbot (run after nginx is configured):
#   sudo apt install certbot
#   sudo certbot --nginx -d suxrobgm.net -d www.suxrobgm.net
#   sudo certbot renew --dry-run   # verify auto-renewal

server {
    listen 80;
    listen [::]:80;
    server_name suxrobgm.net www.suxrobgm.net;

    location / {
        proxy_pass http://127.0.0.1:8000;
		proxy_http_version 1.1;
		proxy_set_header   Upgrade $http_upgrade;
		proxy_set_header   Connection $connection_upgrade;
		proxy_set_header   Host $host;
		proxy_cache_bypass $http_upgrade;
		proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
